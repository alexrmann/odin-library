<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Library</title>

    <!-- ~~~~~~ -->
    <!-- Styles -->
    <!-- ~~~~~~ -->
    <link rel="stylesheet" href="styles.css" />

    <!-- ~~~~~ -->
    <!-- Fonts -->
    <!-- ~~~~~ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- ~~~~~~~ -->
    <!-- Scripts -->
    <!-- ~~~~~~~ -->
    <script src="scripts.js" defer></script>

    <!-- Among other things, scripts of type="module" are deferred until after the DOM is loaded, and its variables are scoped to the module exclusively. -->

    <!-- Example Script -->
    <script type="module">
      // Query and assign the div container to a variable
      const container = document.querySelector("#container");

      // Create a div node for the container's content
      const content = document.createElement("div");

      // Add a class to the new content node
      content.classList.add("content");

      // Add text inside the content node
      content.textContent = "This is some glorious text-content!";

      // Append the content node to the DOM as a child of the container node
      container.appendChild(content);

      // END
    </script>

    <!-- Modules -->
    <script src="addBook.js" type="module"></script>
  </head>
  <body>
    <h1>Odin Library</h1>
    <div id="container"></div>

    <h2>Create New Book</h2>
    <form>
      <fieldset>
        <legend>Enter book information:</legend>

        <div class="group--input">
          <label for="title">Title:</label>
          <input type="text" name="title" id="title" />
        </div>

        <div class="group--input">
          <label for="author">Author:</label>
          <input type="text" name="author" id="author" />
        </div>

        <div class="group--input">
          <label for="pages">Pages:</label>
          <input type="number" name="pages" id="pages" />
        </div>

        <div class="group--input">
          <label for="read">Read status:</label>
          <input type="checkbox" name="read" id="read" />
        </div>

        <button class="btn btn--add">
          <div class="container--icon">
            <img class="icon" src="/assets/icons/book-plus.svg" alt="" />
            Add Book
          </div>
        </button>
      </fieldset>
    </form>

    <section class="my-books">
      <h2 class="heading--library">My Books</h2>
      <ul class="book-list">
        <div class="container container--books container--content">
          <li class="book book-list__item card">
            <div class="book__content card__content">
              <h3 class="book__title"></h3>
              <p class="book__author"></p>
              <p class="book__pages"></p>
              <p class="book__status"></p>
            </div>
            <button class="btn btn--delete btn--round">
              <div class="container--icon">
                <img
                  class="icon"
                  src="/assets/icons/trash-can-outline.svg"
                  alt="Delete book"
                />
              </div>
            </button>
          </li>
          <li class="book book-list__item card">
            <div class="book__content card__content">
              <h3 class="book__title"></h3>
              <p class="book__author"></p>
              <p class="book__pages"></p>
              <p class="book__status"></p>
            </div>
            <button class="btn btn--delete btn--round">
              <div class="container--icon">
                <img
                  class="icon"
                  src="/assets/icons/trash-can-outline.svg"
                  alt="Delete book"
                />
              </div>
            </button>
          </li>
          <li class="book book-list__item card">
            <div class="book__content card__content">
              <h3 class="book__title"></h3>
              <p class="book__author"></p>
              <p class="book__pages"></p>
              <p class="book__status"></p>
            </div>
            <button class="btn btn--delete btn--round">
              <div class="container--icon">
                <img
                  class="icon"
                  src="/assets/icons/trash-can-outline.svg"
                  alt="Delete book"
                />
              </div>
            </button>
          </li>
        </div>
      </ul>
    </section>
  </body>
</html>
